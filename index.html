<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>닥터스위키</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;min-height:100%;background:#eef5fb;color:#111827}
body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif}
button,input{font-family:inherit}
button{border:0;cursor:pointer}
a{color:inherit;text-decoration:none}

.app{max-width:480px;min-height:100vh;margin:0 auto;background:#fff}
.header{padding:30px 24px 8px}
.logo{font-size:32px;font-weight:900;color:#1677ff;letter-spacing:-.07em}
.main{padding:24px}
.home-title{margin:10px 0 18px;font-size:36px;line-height:1.2;font-weight:900;letter-spacing:-.07em}

.search-box{margin-bottom:14px}
.search-input{
  width:100%;
  height:54px;
  padding:0 16px;
  border:1px solid #d8e8ff;
  border-radius:18px;
  background:#f8fbff;
  font-size:16px;
  font-weight:800;
  outline:none;
}
.category-tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px;padding-bottom:2px}
.category-tab{
  flex:0 0 auto;
  padding:10px 14px;
  border-radius:999px;
  background:#eef2f7;
  color:#344054;
  font-size:14px;
  font-weight:900;
}
.category-tab.active{background:#1677ff;color:#fff}

.article-section{margin-bottom:26px}
.section-title{font-size:20px;font-weight:900;margin:0 0 12px}
.article-card{
  width:100%;
  display:block;
  padding:16px;
  border-radius:18px;
  background:#fff;
  border:1px solid #e5edf5;
  margin-bottom:10px;
  text-align:left;
}
.article-category{font-size:12px;color:#1677ff;font-weight:900;margin-bottom:6px}
.article-title{font-size:19px;font-weight:900;line-height:1.35;margin-bottom:6px}
.article-summary{font-size:14px;line-height:1.45;color:#667085}
.empty-text{padding:16px;border-radius:16px;background:#f8fafc;color:#667085;font-size:14px;line-height:1.45}

.menu{display:grid;gap:14px}
.menu-btn,.primary,.gray,.cta-main,.related-btn,.product-item{
  width:100%;
  border-radius:20px;
  font-weight:900;
  transition:.12s ease;
}
.menu-btn{
  min-height:84px;
  padding:18px 20px;
  border:2px solid #d8e8ff;
  background:#f3f8ff;
  text-align:left;
  opacity:0;
  transform:translateY(16px);
  animation:menuUp .45s ease forwards;
}
.menu-btn:nth-child(1){animation-delay:.03s}
.menu-btn:nth-child(2){animation-delay:.08s}
.menu-btn:nth-child(3){animation-delay:.13s}
.menu-btn:nth-child(4){animation-delay:.18s}
.menu-btn:nth-child(5){animation-delay:.23s}
.menu-btn:active,.primary:active,.gray:active,.cta-main:active,.related-btn:active,.product-item:active,.article-card:active,.category-tab:active{
  transform:scale(.96);
  filter:brightness(.97);
}
.menu-name{font-size:26px}
.menu-sub{margin-top:5px;font-size:17px;color:#667085}
@keyframes menuUp{to{opacity:1;transform:translateY(0)}}

.result{display:none}
.topic-title{margin:4px 0 14px;font-size:32px;font-weight:900;line-height:1.25;letter-spacing:-.06em}
.card{padding:18px;border-radius:22px;background:#f8fafc;border:1px solid #e5edf5}
.summary{margin-bottom:18px;font-size:19px;line-height:1.55;color:#344054}

.article-detail-body{
  font-size:18px;
  line-height:1.7;
  color:#263445;
  white-space:pre-line;
}
.article-meta{margin-bottom:12px;font-size:13px;font-weight:900;color:#1677ff}

.video-box{width:100%;aspect-ratio:9/16;background:#111827;border-radius:24px;overflow:hidden}
.video-box.mid{aspect-ratio:16/9}
.video-box iframe{width:100%;height:100%;border:0}
.video-title{margin:16px 0 10px;font-size:25px;font-weight:900;line-height:1.35;letter-spacing:-.04em}
.check-box{margin-top:12px;font-size:18px;line-height:1.55;color:#263445}
.check-box b{color:#1677ff}

.cta-main{min-height:66px;margin-top:18px;background:#12b76a;color:#fff;font-size:21px}
.product-box{margin:18px 0}
.box-title{font-size:20px;font-weight:900;margin-bottom:12px}
.product-item{
  display:block;
  padding:15px 16px;
  border-radius:16px;
  background:#fff;
  border:1px solid #e5edf5;
  margin-bottom:10px;
  font-size:18px;
  font-weight:900;
  text-align:left;
}
.partner-note{margin-top:6px;font-size:12px;line-height:1.45;color:#667085}
.ad-box{
  margin:18px 0;
  padding:18px;
  border-radius:20px;
  background:#fff8e6;
  color:#6b4f00;
  font-size:17px;
  line-height:1.5;
  text-align:center;
}
.mid-section{margin-top:20px;padding-top:18px;border-top:1px solid #e5edf5}
.mid-item{margin-bottom:20px}
.mid-item:last-child{margin-bottom:0}
.related{margin-top:18px}
.related-list{display:grid;gap:10px}
.related-btn{min-height:56px;background:#eef2f7;font-size:18px;color:#263445}
.actions{display:grid;gap:12px;margin-top:18px}
.primary,.gray{min-height:66px;font-size:21px}
.primary{background:#1677ff;color:#fff}
.gray{background:#eef2f7;color:#263445}
.footer{padding:18px 24px 32px;font-size:12px;line-height:1.5;color:#98a2b3}
.app-version{margin-bottom:6px;font-weight:900;color:#1677ff}
</style>
</head>

<body>
<div class="app">
  <header class="header">
    <div class="logo">닥터스위키</div>
  </header>

  <main class="main">
    <section id="home">
      <h1 class="home-title">어디가<br>불편하세요?</h1>

      <section class="article-section">
        <div class="section-title">최신 건강 정보</div>

        <div class="search-box">
          <input id="articleSearch" class="search-input" type="search" placeholder="궁금한 증상을 검색해보세요">
        </div>

        <div class="category-tabs" id="categoryTabs"></div>
        <div id="articleList" class="article-list"></div>
      </section>

      <div class="menu" id="menu"></div>
    </section>

    <section id="result" class="result">
      <div id="resultArea"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="app-version">닥터스위키 · v1.0.1</div>

let allArticles=[];
let selectedCategory="전체";

const $=id=>document.getElementById(id);

function safe(v){
  return String(v??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function videoBlock(id,isMid=false){
  return `
    <div class="video-box ${isMid ? "mid" : ""}">
      <iframe src="https://www.youtube.com/embed/${safe(id)}" allowfullscreen></iframe>
    </div>
  `;
}

function saveClick(type,key){
  try{
    const logs=JSON.parse(localStorage.getItem("doctorwiki_clicks")||"[]");
    logs.push({type,key,time:new Date().toISOString()});
    localStorage.setItem("doctorwiki_clicks",JSON.stringify(logs.slice(-200)));
  }catch(e){}
}

function moveTo(url){
  if(!url || url.includes("_LINK_")){
    alert("연결 링크를 입력해주세요.");
    return;
  }
  location.href=url;
}

function renderMenu(){
  $("menu").innerHTML=MENUS.map(item=>`
    <button class="menu-btn" type="button" data-key="${safe(item.key)}">
      <div class="menu-name">${safe(item.name)}</div>
      <div class="menu-sub">${safe(item.sub)}</div>
    </button>
  `).join("");

  document.querySelectorAll(".menu-btn").forEach(btn=>{
    btn.addEventListener("click",()=>showResult(btn.dataset.key));
  });
}

async function loadArticles(){
  const list=$("articleList");
  list.innerHTML=`<div class="empty-text">건강 정보를 불러오는 중입니다.</div>`;

  const {data,error}=await supabase
    .from("articles")
    .select("*")
    .eq("status","published")
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    list.innerHTML=`<div class="empty-text">글을 불러오지 못했습니다. Supabase 설정을 확인해주세요.</div>`;
    return;
  }

  allArticles=data || [];
  renderCategoryTabs();
  renderArticles();
}

function renderCategoryTabs(){
  const categories=["전체",...new Set(allArticles.map(a=>a.category).filter(Boolean))];

  $("categoryTabs").innerHTML=categories.map(cat=>`
    <button class="category-tab ${cat===selectedCategory ? "active" : ""}" type="button" data-category="${safe(cat)}">
      ${safe(cat)}
    </button>
  `).join("");

  document.querySelectorAll(".category-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
      selectedCategory=btn.dataset.category;
      renderCategoryTabs();
      renderArticles();
    });
  });
}

function renderArticles(){
  const keyword=($("articleSearch").value || "").trim().toLowerCase();

  const filtered=allArticles.filter(article=>{
    const categoryOk=selectedCategory==="전체" || article.category===selectedCategory;
    const text=`${article.title || ""} ${article.summary || ""} ${article.content || ""}`.toLowerCase();
    const keywordOk=!keyword || text.includes(keyword);
    return categoryOk && keywordOk;
  });

  if(filtered.length===0){
    $("articleList").innerHTML=`<div class="empty-text">조건에 맞는 글이 없습니다.</div>`;
    return;
  }

  $("articleList").innerHTML=filtered.map(article=>`
    <button class="article-card" type="button" data-slug="${safe(article.slug)}">
      <div class="article-category">${safe(article.category || "의료정보")}</div>
      <div class="article-title">${safe(article.title)}</div>
      <div class="article-summary">${safe(article.summary || "")}</div>
    </button>
  `).join("");

  document.querySelectorAll(".article-card").forEach(card=>{
    card.addEventListener("click",()=>showArticle(card.dataset.slug));
  });
}

function showArticle(slug){
  const article=allArticles.find(a=>a.slug===slug);
  if(!article) return;

  $("home").style.display="none";
  $("result").style.display="block";

  $("resultArea").innerHTML=`
    <div class="article-meta">${safe(article.category || "의료정보")}</div>
    <div class="topic-title">${safe(article.title)}</div>

    <div class="summary card">
      ${safe(article.summary || "닥터스위키 건강 정보입니다.")}
    </div>

    <div class="card article-detail-body">
      ${safe(article.content || "")}
    </div>

    <div class="ad-box">
      📢 관련 건강 정보<br>
      AdSense 광고 삽입 위치
    </div>

    <div class="actions">
      <button class="gray" type="button" id="backHomeBtn">처음으로 돌아가기</button>
    </div>
  `;

  $("backHomeBtn").addEventListener("click",goHome);
  saveClick("article",slug);
  scrollTop();
}

      <div class="related-list">
        ${related.map(item=>`
          <button class="related-btn" type="button" data-key="${safe(item.key)}">${safe(item.name)}</button>
        `).join("")}
      </div>
    </div>

    <div class="actions">
      <button class="gray" type="button">처음으로 돌아가기</button>
    </div>
  `;

  const clinicBtn=document.querySelector("[data-role='clinic']");
  if(clinicBtn){
    clinicBtn.addEventListener("click",()=>{
      saveClick("clinic",key);
      moveTo(d.clinicLink);
    });
  }

  document.querySelectorAll(".product-item").forEach(btn=>{
    btn.addEventListener("click",()=>{
      saveClick("product",key);
      moveTo(btn.dataset.link);
    });
  });

  document.querySelectorAll(".related-btn").forEach(btn=>{
    btn.addEventListener("click",()=>showResult(btn.dataset.key));
  });

  const gray=document.querySelector(".gray");
  if(gray) gray.addEventListener("click",goHome);

  saveClick("view",key);
  scrollTop();
}

function goHome(){
  $("result").style.display="none";
  $("home").style.display="block";
  scrollTop();
}

function scrollTop(){
  setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),0);
}

$("articleSearch").addEventListener("input",renderArticles);

renderMenu();
loadArticles();
</script>
</body>
</html>
