<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>닥터스위키</title>
<meta name="description" content="증상별 건강 정보를 쉽고 빠르게 확인하세요.">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;min-height:100%;background:#f5f7fa;color:#111827}
body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif}
button,input{font-family:inherit}
button{border:0;cursor:pointer}
a{color:inherit;text-decoration:none}

#intro{
  position:fixed;inset:0;z-index:9999;
  display:flex;justify-content:center;align-items:center;
  background:linear-gradient(180deg,#1677ff 0%,#0f3fff 100%);
  color:#fff;
}
.intro-inner{text-align:center;padding:24px}
.intro-logo{font-size:36px;font-weight:900;letter-spacing:-.07em}
.intro-sub{margin-top:10px;font-size:15px;font-weight:800;opacity:.9}
.intro-sponsor{
  margin-top:22px;padding:10px 14px;border-radius:999px;
  background:rgba(255,255,255,.16);
  font-size:12px;font-weight:900;
}
.intro-hide{animation:introFade .6s ease forwards}
@keyframes introFade{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(1.04)}
}

.app{max-width:480px;min-height:100vh;margin:0 auto;background:#fff}
.header{padding:28px 24px 8px;background:#fff}
.logo{font-size:31px;font-weight:900;color:#1677ff;letter-spacing:-.07em}
.main{padding:22px 22px 24px}

.home-title{
  margin:10px 0 18px;
  font-size:34px;line-height:1.3;font-weight:900;letter-spacing:-.07em;
}

.search-box{margin-bottom:16px}
.search-input{
  width:100%;height:60px;padding:0 18px;
  border:1px solid #e5e8eb;border-radius:16px;background:#f5f7fa;
  font-size:18px;font-weight:800;outline:none;color:#111827;
}
.search-input::placeholder{color:#8a94a6}

.category-tabs{
  display:flex;gap:8px;overflow-x:auto;
  margin-bottom:20px;padding-bottom:4px;
}
.category-tabs::-webkit-scrollbar{display:none}
.category-tab{
  flex:0 0 auto;min-height:44px;
  padding:12px 16px;border-radius:999px;
  background:#eef2f7;color:#344054;
  font-size:15px;font-weight:900;
}
.category-tab.active{background:#1677ff;color:#fff}

.curation-section{
  margin:4px 0 28px;padding:18px;
  border-radius:18px;background:#f8fafc;border:1px solid #e5e8eb;
}
.curation-head{margin-bottom:14px}
.curation-label{
  font-size:11px;font-weight:900;color:#1677ff;letter-spacing:.12em;
}
.curation-title{
  margin-top:4px;font-size:23px;font-weight:900;letter-spacing:-.05em;
}

.pick-card{
  width:100%;display:block;padding:18px;
  border-radius:16px;background:#fff;border:1px solid #e5e8eb;
  text-align:left;margin-bottom:10px;transition:.12s ease;
}
.pick-card.hero{
  padding:22px;border:2px solid var(--accent,#1677ff);
  background:linear-gradient(180deg,var(--soft,#f5f9ff) 0%,#fff 100%);
  box-shadow:none;
}
.pick-badge{
  display:inline-flex;margin-bottom:12px;padding:7px 11px;
  border-radius:999px;background:var(--accent,#1677ff);
  color:#fff;font-size:12px;font-weight:900;
}
.pick-title{
  font-size:21px;font-weight:900;line-height:1.38;
  letter-spacing:-.04em;margin-bottom:6px;
}
.pick-card.hero .pick-title{font-size:25px}
.pick-summary,.article-summary{
  font-size:15px;line-height:1.55;color:#667085;
}

.article-section{margin-bottom:26px}
.section-title{
  font-size:22px;font-weight:900;margin:0 0 14px;letter-spacing:-.04em;
}
.article-card{
  width:100%;display:block;padding:17px;
  border-radius:14px;background:#fff;border:1px solid #e5e8eb;
  margin-bottom:10px;text-align:left;transition:.12s ease;
}
.article-category{
  font-size:13px;color:var(--accent,#1677ff);
  font-weight:900;margin-bottom:7px;
}
.article-title{
  font-size:20px;font-weight:900;line-height:1.4;
  letter-spacing:-.04em;margin-bottom:6px;
}
.empty-text{
  padding:18px;border-radius:16px;background:#f8fafc;
  color:#667085;font-size:15px;line-height:1.55;
}

.result{display:none}
.topic-title{
  margin:4px 0 14px;
  font-size:31px;font-weight:900;line-height:1.28;letter-spacing:-.06em;
}
.card{
  padding:18px;border-radius:16px;background:#f8fafc;border:1px solid #e5e8eb;
}
.summary{
  margin-bottom:18px;font-size:19px;line-height:1.65;color:#344054;
}
.article-detail-body{
  margin-top:18px;padding:20px;border-radius:16px;background:#fff;
  border:1px solid #e5e8eb;font-size:19px;line-height:1.8;color:#263445;
}
.content-heading{
  margin:28px 0 10px;font-size:22px;line-height:1.4;
  font-weight:900;letter-spacing:-.04em;color:#111827;
}
.content-heading:first-child{margin-top:0}
.content-paragraph{
  margin:0 0 15px;font-size:19px;line-height:1.8;color:#263445;
}
.notice-box{
  margin:18px 0;padding:16px;border-radius:14px;
  font-size:17px;line-height:1.6;font-weight:800;
}
.notice-box.warning{background:#fff7ed;color:#9a3412}
.notice-box.tip{background:#eef6ff;color:#175cd3}
.article-meta{
  margin-bottom:12px;font-size:14px;font-weight:900;color:#1677ff;
}

.related-section{
  margin:24px 0 18px;
  padding:20px 16px;
  border-radius:18px;
  background:#f5f7fa;
  border:1px solid #e5e8eb;
}
.related-section-title{
  margin-bottom:12px;
  font-size:21px;
  font-weight:900;
  letter-spacing:-.04em;
}
.related-section .article-card{
  background:#fff;
  margin-bottom:10px;
}
.related-section .article-card:last-child{margin-bottom:0}

.video-box{
  width:100%;aspect-ratio:9/16;background:#111827;
  border-radius:18px;overflow:hidden;margin-bottom:18px;
}
.video-box.mid{aspect-ratio:16/9}
.video-box iframe{width:100%;height:100%;border:0}

.video-section-head{margin-bottom:12px}
.video-badge{
  display:inline-block;padding:5px 9px;border-radius:999px;
  background:#1677ff;color:#fff;font-size:12px;font-weight:900;margin-bottom:7px;
}
.video-section-title{
  font-size:22px;font-weight:900;letter-spacing:-.04em;
}

.primary,.gray,.cta-main{
  width:100%;min-height:66px;border-radius:16px;
  font-size:21px;font-weight:900;
}
.primary{background:#1677ff;color:#fff}
.gray{background:#eef2f7;color:#263445}
.cta-main{margin-top:24px;background:#12b76a;color:#fff}

.top-actions{display:grid;gap:10px;margin:18px 0}
.actions{display:grid;gap:12px;margin-top:18px}

.product-box{margin:18px 0}
.box-title{
  font-size:21px;font-weight:900;margin-bottom:12px;letter-spacing:-.04em;
}
.product-item{
  width:100%;display:block;padding:16px;border-radius:14px;
  background:#fff;border:1px solid #e5e8eb;margin-bottom:10px;
  font-size:18px;font-weight:900;text-align:left;
}
.partner-note{
  margin-top:6px;font-size:12px;line-height:1.45;color:#667085;
}

.ad-box{
  margin:18px 0;padding:16px;border-radius:14px;
  background:#f2f4f7;color:#667085;
  font-size:14px;line-height:1.5;text-align:center;
}

.mid-section{
  margin-top:22px;padding-top:20px;border-top:1px solid #e5e8eb;
}
.mid-item{margin-bottom:20px}
.mid-item:last-child{margin-bottom:0}

.primary:active,
.gray:active,
.cta-main:active,
.product-item:active,
.article-card:active,
.category-tab:active,
.pick-card:active{
  transform:scale(.97);filter:brightness(.98);
}

.footer{
  padding:18px 24px 32px;
  font-size:12px;line-height:1.5;color:#98a2b3;
}
.app-version{margin-bottom:6px;font-weight:900;color:#1677ff}
</style>
</head>

<body>
<div id="intro">
  <div class="intro-inner">
    <div class="intro-logo">닥터스위키</div>
    <div class="intro-sub">증상별 건강 정보를 쉽고 빠르게</div>
    <div class="intro-sponsor">오늘의 건강 체크</div>
  </div>
</div>

<div class="app">
  <header class="header">
    <div class="logo">닥터스위키</div>
  </header>

  <main class="main">
    <section id="home">
      <h1 class="home-title">어디가<br>불편하세요?</h1>

      <section class="article-section">
        <div class="search-box">
          <input id="articleSearch" class="search-input" type="search" placeholder="증상이나 진료과를 검색해보세요">
        </div>
        <div class="category-tabs" id="categoryTabs"></div>
      </section>

      <section class="curation-section" id="popularSection" style="display:none;">
        <div class="curation-head">
          <div class="curation-label">DOCTOR'S PICK</div>
          <div class="curation-title">오늘 많이 보는 건강 정보</div>
        </div>
        <div id="popularList"></div>
      </section>

      <section class="article-section">
        <div class="section-title">최신 건강 정보</div>
        <div id="articleList"></div>
      </section>
    </section>

    <section id="result" class="result">
      <div id="resultArea"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="app-version">닥터스위키 · v1.1.6</div>
    <div>건강 정보는 참고용입니다. 진단과 치료는 의료진과 상담하세요.</div>
  </footer>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://rulsdjtrofwfpedtaaap.supabase.co",
  "sb_publishable_qzSAcaIpz2Sq-xo_NxA23g_D_xlCdxW"
);

let allArticles=[];
let selectedCategory="전체";

const $=id=>document.getElementById(id);

function safe(v){
  return String(v??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeCategory(category){
  return String(category || "기타").trim();
}

function formatContent(content){
  return String(content || "")
    .split("\n")
    .map(line=>{
      const text=line.trim();
      if(!text) return `<br>`;

      if(text.startsWith("주의:")){
        return `<div class="notice-box warning">⚠️ ${safe(text.replace("주의:","").trim())}</div>`;
      }

      if(text.startsWith("팁:")){
        return `<div class="notice-box tip">💡 ${safe(text.replace("팁:","").trim())}</div>`;
      }

      if(
        text.startsWith("#") ||
        text.startsWith("✔") ||
        text.startsWith("1.") ||
        text.startsWith("2.") ||
        text.startsWith("3.") ||
        text.startsWith("4.") ||
        text.startsWith("5.") ||
        text.endsWith("?")
      ){
        return `<h3 class="content-heading">${safe(text.replace(/^#+\s*/,""))}</h3>`;
      }

      return `<p class="content-paragraph">${safe(text)}</p>`;
    })
    .join("");
}

function categoryStyle(category){
  const styles={
    "치과":{accent:"#1677ff",soft:"#f5f9ff"},
    "정형외과":{accent:"#7c3aed",soft:"#f7f3ff"},
    "안과":{accent:"#0891b2",soft:"#f0fcff"},
    "수면":{accent:"#4f46e5",soft:"#f4f5ff"},
    "내과":{accent:"#12b76a",soft:"#f1fdf6"},
    "피부과":{accent:"#f97316",soft:"#fff7ed"},
    "이비인후과":{accent:"#db2777",soft:"#fff1f7"}
  };

  const s=styles[normalizeCategory(category)] || {accent:"#1677ff",soft:"#f5f9ff"};
  return `--accent:${s.accent};--soft:${s.soft};`;
}

function moveTo(url){
  if(!url || url.includes("_LINK_")){
    alert("연결 링크를 입력해주세요.");
    return;
  }
  location.href=url;
}

function saveClick(type,key){
  try{
    const logs=JSON.parse(localStorage.getItem("doctorwiki_clicks")||"[]");
    logs.push({type,key,time:new Date().toISOString()});
    localStorage.setItem("doctorwiki_clicks",JSON.stringify(logs.slice(-200)));
  }catch(e){}
}

async function copyCurrentLink(btn){
  try{
    await navigator.clipboard.writeText(window.location.href);
    const original=btn.innerText;
    btn.innerText="공유 링크 복사 완료 ✓";
    setTimeout(()=>{btn.innerText=original},1400);
  }catch(e){
    alert("복사에 실패했습니다. 주소창의 링크를 직접 복사해주세요.");
  }
}

function updateMeta(article){
  document.title=`${article.title || "닥터스위키"} | 닥터스위키`;

  const metaDesc=document.querySelector('meta[name="description"]');
  if(metaDesc){
    metaDesc.setAttribute("content",article.summary || "증상별 건강 정보를 쉽고 빠르게 확인하세요.");
  }
}

function showIntro(){
  const intro=$("intro");
  if(!intro) return;

  setTimeout(()=>{
    intro.classList.add("intro-hide");

    setTimeout(()=>{
      intro.style.display="none";
      localStorage.setItem("doctorwiki_intro_seen","1");
    },600);
  },1500);
}

async function loadArticles(){
  $("articleList").innerHTML=`<div class="empty-text">건강 정보를 불러오는 중입니다.</div>`;

  const {data,error}=await supabase
    .from("articles")
    .select("*")
    .eq("status","published")
    .order("sort_order",{ascending:true})
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    $("articleList").innerHTML=`<div class="empty-text">글을 불러오지 못했습니다. Supabase 설정을 확인해주세요.</div>`;
    return;
  }

  allArticles=(data || []).map(article=>({
    ...article,
    category:normalizeCategory(article.category)
  }));

  renderCategoryTabs();
  renderPopularArticles();
  renderArticles();

  const path=decodeURIComponent(location.pathname.replace(/^\/+/,"").trim());
  if(path && path !== "index.html"){
    const found=allArticles.find(article=>article.slug===path);
    if(found) showArticle(path,false);
  }
}

function renderCategoryTabs(){
  const categories=["전체",...new Set(allArticles.map(a=>normalizeCategory(a.category)).filter(Boolean))];

  $("categoryTabs").innerHTML=categories.map(cat=>`
    <button class="category-tab ${cat===selectedCategory ? "active" : ""}" type="button" data-category="${safe(cat)}">
      ${safe(cat)}
    </button>
  `).join("");

  document.querySelectorAll(".category-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
      selectedCategory=btn.dataset.category;
      renderCategoryTabs();
      renderArticles();
    });
  });
}

function renderPopularArticles(){
  const popularSection=$("popularSection");
  const popularList=$("popularList");
  const categoryMap={};

  allArticles.forEach(article=>{
    const category=normalizeCategory(article.category);
    if(!categoryMap[category]) categoryMap[category]=[];
    categoryMap[category].push(article);
  });

  const picks=Object.values(categoryMap)
    .map(list=>list.sort((a,b)=>(b.view_count || 0)-(a.view_count || 0))[0])
    .sort((a,b)=>(b.view_count || 0)-(a.view_count || 0))
    .slice(0,5);

  if(picks.length===0){
    popularSection.style.display="none";
    return;
  }

  popularSection.style.display="block";

  popularList.innerHTML=picks.map((article,index)=>`
    <button
      class="pick-card ${index===0 ? "hero" : ""}"
      type="button"
      data-slug="${safe(article.slug)}"
      style="${categoryStyle(article.category)}"
    >
      <div class="pick-badge">${safe(article.category || "추천")}</div>
      <div class="pick-title">${safe(article.title)}</div>
      <div class="pick-summary">${safe(article.summary || "")}</div>
    </button>
  `).join("");

  popularList.querySelectorAll(".pick-card").forEach(card=>{
    card.addEventListener("click",()=>showArticle(card.dataset.slug));
  });
}

function renderArticles(){
  const keyword=($("articleSearch").value || "").trim().toLowerCase();

  const filtered=allArticles.filter(article=>{
    const articleCategory=normalizeCategory(article.category);
    const categoryOk=selectedCategory==="전체" || articleCategory===selectedCategory;
    const text=`${article.title || ""} ${article.summary || ""} ${article.content || ""}`.toLowerCase();
    const keywordOk=!keyword || text.includes(keyword);
    return categoryOk && keywordOk;
  });

  if(filtered.length===0){
    $("articleList").innerHTML=`<div class="empty-text">조건에 맞는 글이 없습니다. 다른 증상이나 진료과를 검색해보세요.</div>`;
    return;
  }

  $("articleList").innerHTML=filtered.map(article=>`
    <button class="article-card" type="button" data-slug="${safe(article.slug)}" style="${categoryStyle(article.category)}">
      <div class="article-category">${safe(article.category || "의료정보")}</div>
      <div class="article-title">${safe(article.title)}</div>
      <div class="article-summary">${safe(article.summary || "")}</div>
    </button>
  `).join("");

  document.querySelectorAll("#articleList .article-card").forEach(card=>{
    card.addEventListener("click",()=>showArticle(card.dataset.slug));
  });
}

function getTwoRandomDifferentCategoryArticles(currentSlug,currentCategory){
  const categoryMap={};
  const current=normalizeCategory(currentCategory);

  allArticles
    .filter(article=>article.slug!==currentSlug)
    .filter(article=>normalizeCategory(article.category)!==current)
    .forEach(article=>{
      const category=normalizeCategory(article.category);
      if(!categoryMap[category]) categoryMap[category]=[];
      categoryMap[category].push(article);
    });

  const categories=Object.keys(categoryMap);
  if(categories.length===0) return [];

  const shuffled=[...categories].sort(()=>Math.random()-0.5).slice(0,2);

  return shuffled.map(category=>{
    const list=categoryMap[category];
    return list[Math.floor(Math.random()*list.length)];
  }).filter(Boolean);
}

async function increaseViewCount(article){
  const nextViewCount=(article.view_count || 0)+1;

  const {error}=await supabase
    .from("articles")
    .update({view_count:nextViewCount})
    .eq("id",article.id);

  if(!error){
    article.view_count=nextViewCount;
    renderPopularArticles();
  }
}

function showArticle(slug,changeUrl=true){
  const article=allArticles.find(a=>a.slug===slug);
  if(!article) return;

  const relatedArticles=getTwoRandomDifferentCategoryArticles(article.slug,article.category);

  $("home").style.display="none";
  $("result").style.display="block";

  if(changeUrl && article.slug){
    history.pushState(null,"",`/${article.slug}`);
  }

  updateMeta(article);

  $("resultArea").innerHTML=`
    <div class="article-meta">${safe(article.category || "의료정보")}</div>
    <div class="topic-title">${safe(article.title)}</div>

    <div class="summary card">
      ${safe(article.summary || "닥터스위키 건강 정보입니다.")}
    </div>

    <div class="top-actions">
      <button class="primary" type="button" id="copyTopBtn">📤 가족에게 공유하기</button>
    </div>

    ${article.video_short ? `
      <div class="video-box">
        <iframe src="https://www.youtube.com/embed/${safe(article.video_short)}" allowfullscreen></iframe>
      </div>
    ` : ""}

    <div class="card article-detail-body">
      ${formatContent(article.content || "")}
    </div>

    ${relatedArticles.length>0 ? `
      <div class="related-section">
        <div class="related-section-title">이런 증상도 같이 확인해보세요</div>

        ${relatedArticles.map(item=>`
          <button
            class="article-card related-card"
            type="button"
            data-slug="${safe(item.slug)}"
            style="${categoryStyle(item.category)}"
          >
            <div class="article-category">${safe(item.category || "의료정보")}</div>
            <div class="article-title">${safe(item.title)}</div>
            <div class="article-summary">${safe(item.summary || "")}</div>
          </button>
        `).join("")}
      </div>
    ` : ""}

    ${article.cta_text ? `
      <button class="cta-main" type="button" data-url="${safe(article.clinic_link || "")}" data-click-type="clinic" data-click-key="${safe(article.slug)}">
        🏥 ${safe(article.cta_text)}
      </button>
    ` : ""}

    ${article.product_1_name ? `
      <div class="product-box card">
        <div class="box-title">🛒 추천 상품</div>

        <button class="product-item" type="button" data-url="${safe(article.product_1_link || "")}" data-click-type="product_1" data-click-key="${safe(article.slug)}">
          ${safe(article.product_1_name)}
        </button>

        ${article.product_2_name ? `
          <button class="product-item" type="button" data-url="${safe(article.product_2_link || "")}" data-click-type="product_2" data-click-key="${safe(article.slug)}">
            ${safe(article.product_2_name)}
          </button>
        ` : ""}

        <div class="partner-note">파트너스 활동을 통해 일정 수수료를 받을 수 있습니다.</div>
      </div>
    ` : ""}

    ${article.video_mid_1 ? `
      <div class="mid-section">
        <div class="video-section-head">
          <span class="video-badge">추천</span>
          <div class="video-section-title">관련 영상</div>
        </div>

        <div class="mid-item">
          <div class="video-box mid">
            <iframe src="https://www.youtube.com/embed/${safe(article.video_mid_1)}" allowfullscreen></iframe>
          </div>
        </div>

        ${article.video_mid_2 ? `
          <div class="mid-item">
            <div class="video-box mid">
              <iframe src="https://www.youtube.com/embed/${safe(article.video_mid_2)}" allowfullscreen></iframe>
            </div>
          </div>
        ` : ""}
      </div>
    ` : ""}

    <div class="ad-box">
      AD · 관련 건강 정보 광고 영역
    </div>

    <div class="actions">
      <button class="primary" type="button" id="copyBottomBtn">📤 가족에게 공유하기</button>
      <button class="gray" type="button" id="homeBtn">처음 화면으로</button>
    </div>
  `;

  document.querySelectorAll("[data-url]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      saveClick(btn.dataset.clickType,btn.dataset.clickKey);
      moveTo(btn.dataset.url);
    });
  });

  document.querySelectorAll(".related-card").forEach(card=>{
    card.addEventListener("click",()=>showArticle(card.dataset.slug));
  });

  const copyTopBtn=$("copyTopBtn");
  const copyBottomBtn=$("copyBottomBtn");
  const homeBtn=$("homeBtn");

  if(copyTopBtn) copyTopBtn.addEventListener("click",()=>copyCurrentLink(copyTopBtn));
  if(copyBottomBtn) copyBottomBtn.addEventListener("click",()=>copyCurrentLink(copyBottomBtn));
  if(homeBtn) homeBtn.addEventListener("click",goHome);

  saveClick("article",slug);
  increaseViewCount(article);
  scrollTop();
}

function goHome(){
  $("result").style.display="none";
  $("home").style.display="block";
  history.pushState(null,"","/");
  document.title="닥터스위키";

  const metaDesc=document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute("content","증상별 건강 정보를 쉽고 빠르게 확인하세요.");

  scrollTop();
}

window.addEventListener("popstate",()=>{
  const path=decodeURIComponent(location.pathname.replace(/^\/+/,"").trim());

  if(path){
    const found=allArticles.find(article=>article.slug===path);
    if(found) showArticle(path,false);
  }else{
    $("result").style.display="none";
    $("home").style.display="block";
  }
});

function scrollTop(){
  setTimeout(()=>window.scrollTo({top:0,behavior:"smooth"}),0);
}

$("articleSearch").addEventListener("input",renderArticles);

showIntro();
loadArticles();

supabase
  .channel("articles-realtime")
  .on(
    "postgres_changes",
    {
      event:"*",
      schema:"public",
      table:"articles"
    },
    ()=>{
      loadArticles();
    }
  )
  .subscribe();
</script>
</body>
</html>
